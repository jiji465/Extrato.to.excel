# Blueprint do Render — implanta o app COMPLETO (com OCR).
# No painel do Render: New > Blueprint > conecte o repositório do GitHub.
services:
  - type: web
    name: extrato-conversor
    runtime: python
    plan: free                       # suba para 'starter' se faltar memória no OCR
    buildCommand: pip install -r requirements-ocr.txt
    # --bind 0.0.0.0:$PORT é OBRIGATÓRIO no Render (senão o serviço sobe numa
    # porta que o Render não checa e o deploy falha). 1 worker p/ caber na RAM
    # do plano free durante o OCR (suba p/ 2 no Starter).
    startCommand: gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: EXTRATO_SECRET
        generateValue: true          # chave de sessão gerada automaticamente
      - key: EXTRATO_SENHA
        sync: false                  # defina no painel se quiser exigir senha
