<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — Conversor de Extratos</title>
  <style>
    :root{--petroleo:#0f766e;--petroleo2:#115e59;--petroleo-claro:#ccfbf1;
          --texto:#0f172a;--sec:#475569;--borda:#e2e8f0;--fundo:#f1f5f9;--erro:#dc2626}
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;
         background:var(--fundo);color:var(--texto);
         display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border:1px solid var(--borda);border-radius:16px;
          padding:34px 30px;width:340px;box-shadow:0 8px 30px rgba(15,23,42,.08)}
    .marca{font-weight:800;font-size:1.15rem;display:flex;align-items:center;gap:8px;
           color:var(--petroleo)}
    p.sub{color:var(--sec);margin:6px 0 22px;font-size:.9rem}
    label{display:block;font-size:.82rem;color:var(--sec);font-weight:600;margin-bottom:6px}
    input{width:100%;padding:12px 14px;font-size:1rem;border:1px solid #cbd5e1;
          border-radius:10px;margin-bottom:16px;outline:none}
    input:focus{border-color:var(--petroleo);box-shadow:0 0 0 3px var(--petroleo-claro)}
    button{width:100%;background:var(--petroleo);color:#fff;border:0;border-radius:10px;
           padding:13px;font-size:1rem;font-weight:700;cursor:pointer}
    button:hover{background:var(--petroleo2)}
    .erro{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;border-radius:10px;
          padding:10px 12px;font-size:.86rem;margin-bottom:14px}
  </style>
</head>
<body>
  <form class="card" method="post">
    <div class="marca">📊 Conversor de Extratos</div>
    <p class="sub">Acesso restrito à equipe. Digite a senha para continuar.</p>
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
    <label for="senha">Senha</label>
    <input id="senha" type="password" name="senha" placeholder="••••••••" autofocus>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
