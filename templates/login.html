<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — Extrato PDF → Excel</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           margin:0; background:#f5f6fa; color:#111827;
           display:flex; min-height:100vh; align-items:center; justify-content:center; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:16px;
            padding:36px 32px; width:320px; box-shadow:0 6px 24px rgba(0,0,0,.06); }
    h1 { font-size:1.2rem; margin:0 0 4px; }
    p.sub { color:#6b7280; margin:0 0 22px; font-size:.9rem; }
    input { width:100%; box-sizing:border-box; padding:12px 14px; font-size:1rem;
            border:1px solid #d1d5db; border-radius:10px; margin-bottom:14px; }
    button { width:100%; background:#4F46E5; color:#fff; border:0; border-radius:10px;
             padding:13px; font-size:1rem; font-weight:600; cursor:pointer; }
    button:hover { background:#6366F1; }
    .erro { color:#dc2626; font-size:.9rem; margin-bottom:12px; }
  </style>
</head>
<body>
  <form class="card" method="post">
    <h1>Extrato PDF → Excel</h1>
    <p class="sub">Digite a senha de acesso da equipe.</p>
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
    <input type="password" name="senha" placeholder="Senha" autofocus>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
